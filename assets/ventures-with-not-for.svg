<svg viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="960" height="520" fill="#F7F5F1"/>

  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#B08D57">THE PARTNERSHIP MODEL</text>
  <text x="60" y="92" font-size="27" fill="#23303D">We build with founders, not for them</text>

  <defs>
    <marker id="arrowPart" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B08D57"/>
    </marker>
  </defs>

  <!-- Founder box (left) -->
  <rect x="80" y="160" width="250" height="150" fill="#FFFFFF" stroke="#23303D" stroke-width="1.5"/>
  <text x="205" y="198" font-size="17" fill="#23303D" text-anchor="middle">The founder brings</text>
  <line x1="120" y1="212" x2="290" y2="212" stroke="#D8D3C8" stroke-width="1"/>
  <text x="205" y="240" font-size="12.5" fill="#5B6672" text-anchor="middle">The product and its proof</text>
  <text x="205" y="262" font-size="12.5" fill="#5B6672" text-anchor="middle">The vision and the domain</text>
  <text x="205" y="284" font-size="12.5" fill="#5B6672" text-anchor="middle">The will to build a company</text>

  <!-- Akenius box (right) -->
  <rect x="630" y="160" width="250" height="150" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="755" y="198" font-size="17" fill="#23303D" text-anchor="middle">Akenius brings</text>
  <line x1="670" y1="212" x2="840" y2="212" stroke="#D8D3C8" stroke-width="1"/>
  <text x="755" y="240" font-size="12.5" fill="#5B6672" text-anchor="middle">Commercial leadership</text>
  <text x="755" y="262" font-size="12.5" fill="#5B6672" text-anchor="middle">Nordic market experience</text>
  <text x="755" y="284" font-size="12.5" fill="#5B6672" text-anchor="middle">Skin in the game</text>

  <!-- Converging arrows into shared venture -->
  <line x1="255" y1="310" x2="410" y2="378" stroke="#B08D57" stroke-width="2" marker-end="url(#arrowPart)"/>
  <line x1="705" y1="310" x2="550" y2="378" stroke="#B08D57" stroke-width="2" marker-end="url(#arrowPart)"/>

  <!-- Shared venture box (center bottom) -->
  <rect x="330" y="384" width="300" height="88" fill="#B08D57" opacity="0.12"/>
  <rect x="330" y="384" width="300" height="88" fill="none" stroke="#B08D57" stroke-width="1.5"/>
  <text x="480" y="420" font-size="17" fill="#23303D" text-anchor="middle">The shared venture</text>
  <text x="480" y="446" font-size="12" fill="#B08D57" text-anchor="middle" font-style="italic">shared decisions · shared risk · shared upside</text>

  <!-- Principles between the boxes -->
  <text x="480" y="196" font-size="12.5" fill="#5B6672" text-anchor="middle" font-style="italic">Equity or results — never fees</text>
  <text x="480" y="228" font-size="12.5" fill="#5B6672" text-anchor="middle" font-style="italic">Defined commercial ground</text>
  <text x="480" y="260" font-size="12.5" fill="#5B6672" text-anchor="middle" font-style="italic">Few ventures at a time</text>
  <text x="480" y="292" font-size="12.5" fill="#5B6672" text-anchor="middle" font-style="italic">Exits agreed at the start</text>

  <text x="900" y="508" font-size="13" fill="#B08D57" text-anchor="end" letter-spacing="2">AKENIUS · VENTURES</text>
</svg>
