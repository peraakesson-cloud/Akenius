<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="960" height="500" fill="#F7F5F1"/>

  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#B08D57">CHOOSING THE FORM</text>
  <text x="60" y="92" font-size="27" fill="#23303D">From formal seat to confidential counterpart</text>

  <!-- Spectrum line -->
  <line x1="120" y1="150" x2="840" y2="150" stroke="#D8D3C8" stroke-width="1.5"/>
  <text x="120" y="136" font-size="11.5" fill="#8A939E">formal · accountable to all owners</text>
  <text x="840" y="136" font-size="11.5" fill="#8A939E" text-anchor="end">informal · accountable to you</text>
  <circle cx="200" cy="150" r="6" fill="#B08D57"/>
  <circle cx="480" cy="150" r="6" fill="#B08D57"/>
  <circle cx="760" cy="150" r="6" fill="#B08D57"/>

  <!-- Column 1: Board member -->
  <rect x="80" y="186" width="248" height="240" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <text x="104" y="224" font-size="17" fill="#23303D">Board member</text>
  <line x1="104" y1="238" x2="304" y2="238" stroke="#D8D3C8" stroke-width="1"/>
  <text x="104" y="266" font-size="12" fill="#5B6672">Formal seat under the</text>
  <text x="104" y="283" font-size="12" fill="#5B6672">Companies Act — fiduciary</text>
  <text x="104" y="300" font-size="12" fill="#5B6672">duty to the company.</text>
  <text x="104" y="330" font-size="12" fill="#5B6672">Cadence: the board year —</text>
  <text x="104" y="347" font-size="12" fill="#5B6672">meetings, committees,</text>
  <text x="104" y="364" font-size="12" fill="#5B6672">annual plan.</text>
  <text x="104" y="398" font-size="12" fill="#B08D57" font-style="italic">For: companies ready to</text>
  <text x="104" y="415" font-size="12" fill="#B08D57" font-style="italic">move beyond a paper board.</text>

  <!-- Column 2: Chair support -->
  <rect x="356" y="186" width="248" height="240" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <text x="380" y="224" font-size="17" fill="#23303D">Chair support</text>
  <line x1="380" y1="238" x2="580" y2="238" stroke="#D8D3C8" stroke-width="1"/>
  <text x="380" y="266" font-size="12" fill="#5B6672">Behind the chair — no seat,</text>
  <text x="380" y="283" font-size="12" fill="#5B6672">full engagement in agenda,</text>
  <text x="380" y="300" font-size="12" fill="#5B6672">material and preparation.</text>
  <text x="380" y="330" font-size="12" fill="#5B6672">Cadence: before and after</text>
  <text x="380" y="347" font-size="12" fill="#5B6672">each board meeting, plus</text>
  <text x="380" y="364" font-size="12" fill="#5B6672">the annual cycle.</text>
  <text x="380" y="398" font-size="12" fill="#B08D57" font-style="italic">For: owner-chairs carrying</text>
  <text x="380" y="415" font-size="12" fill="#B08D57" font-style="italic">the board alongside the job.</text>

  <!-- Column 3: Sparring partner -->
  <rect x="632" y="186" width="248" height="240" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="656" y="224" font-size="17" fill="#23303D">Sparring partner</text>
  <line x1="656" y1="238" x2="856" y2="238" stroke="#D8D3C8" stroke-width="1"/>
  <text x="656" y="266" font-size="12" fill="#5B6672">Confidential counterpart to</text>
  <text x="656" y="283" font-size="12" fill="#5B6672">the CEO or owner. Your</text>
  <text x="656" y="300" font-size="12" fill="#5B6672">agenda, tested hard.</text>
  <text x="656" y="330" font-size="12" fill="#5B6672">Cadence: fixed monthly</text>
  <text x="656" y="347" font-size="12" fill="#5B6672">session, direct access when</text>
  <text x="656" y="364" font-size="12" fill="#5B6672">a decision won't keep.</text>
  <text x="656" y="398" font-size="12" fill="#B08D57" font-style="italic">For: the decisions with</text>
  <text x="656" y="415" font-size="12" fill="#B08D57" font-style="italic">nowhere else to go.</text>

  <!-- Footer -->
  <line x1="60" y1="452" x2="900" y2="452" stroke="#D8D3C8" stroke-width="1"/>
  <text x="60" y="480" font-size="13" fill="#8A939E" font-style="italic">All three share one rule: what is said in the room stays in the room.</text>
  <text x="900" y="480" font-size="13" fill="#B08D57" text-anchor="end" letter-spacing="2">AKENIUS · ADVISORY</text>
</svg>
