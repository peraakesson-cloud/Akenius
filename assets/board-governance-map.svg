<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="960" height="560" fill="#F7F5F1"/>

  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#B08D57">THREE WAYS IN</text>
  <text x="60" y="92" font-size="27" fill="#23303D">One counterpart, three places at the table</text>

  <defs>
    <marker id="arrowGov" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A939E"/>
    </marker>
  </defs>

  <!-- Governance chain (left column) -->
  <!-- Owners -->
  <rect x="120" y="140" width="220" height="76" fill="#FFFFFF" stroke="#23303D" stroke-width="1.5"/>
  <text x="230" y="172" font-size="17" fill="#23303D" text-anchor="middle">Owners</text>
  <text x="230" y="196" font-size="11.5" fill="#8A939E" text-anchor="middle" font-style="italic">direction and mandate</text>

  <line x1="230" y1="216" x2="230" y2="252" stroke="#8A939E" stroke-width="1.5" marker-end="url(#arrowGov)"/>

  <!-- Board -->
  <rect x="120" y="258" width="220" height="76" fill="#FFFFFF" stroke="#23303D" stroke-width="1.5"/>
  <text x="230" y="290" font-size="17" fill="#23303D" text-anchor="middle">Board</text>
  <text x="230" y="314" font-size="11.5" fill="#8A939E" text-anchor="middle" font-style="italic">governance and oversight</text>

  <line x1="230" y1="334" x2="230" y2="370" stroke="#8A939E" stroke-width="1.5" marker-end="url(#arrowGov)"/>

  <!-- CEO / Management -->
  <rect x="120" y="376" width="220" height="76" fill="#FFFFFF" stroke="#23303D" stroke-width="1.5"/>
  <text x="230" y="408" font-size="17" fill="#23303D" text-anchor="middle">CEO &amp; management</text>
  <text x="230" y="432" font-size="11.5" fill="#8A939E" text-anchor="middle" font-style="italic">execution and results</text>

  <!-- Akenius roles (right side, brass connectors) -->
  <!-- Board member -->
  <line x1="340" y1="296" x2="470" y2="296" stroke="#B08D57" stroke-width="2"/>
  <circle cx="340" cy="296" r="5" fill="#B08D57"/>
  <rect x="470" y="258" width="400" height="76" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="494" y="288" font-size="16" fill="#23303D">Board member</text>
  <text x="494" y="312" font-size="12" fill="#5B6672" font-style="italic">A formal seat — fiduciary responsibility, an outside voice inside.</text>

  <!-- Chair support: connects from the Board box (the chair sits on the board) -->
  <line x1="340" y1="272" x2="470" y2="188" stroke="#B08D57" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="340" cy="272" r="5" fill="#B08D57"/>
  <rect x="470" y="142" width="400" height="76" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="494" y="172" font-size="16" fill="#23303D">Chair support</text>
  <text x="494" y="196" font-size="12" fill="#5B6672" font-style="italic">Behind the chair — board cycle, preparation, the difficult items.</text>

  <!-- Sparring partner -->
  <line x1="340" y1="414" x2="470" y2="414" stroke="#B08D57" stroke-width="2" stroke-dasharray="6 5"/>
  <circle cx="340" cy="414" r="5" fill="#B08D57"/>
  <rect x="470" y="376" width="400" height="76" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="494" y="406" font-size="16" fill="#23303D">Sparring partner</text>
  <text x="494" y="430" font-size="12" fill="#5B6672" font-style="italic">Beside the CEO or owner — confidential, standing, no other agenda.</text>

  <!-- Legend -->
  <line x1="120" y1="492" x2="164" y2="492" stroke="#B08D57" stroke-width="2"/>
  <text x="174" y="496" font-size="11.5" fill="#8A939E">formal role</text>
  <line x1="280" y1="492" x2="324" y2="492" stroke="#B08D57" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="334" y="496" font-size="11.5" fill="#8A939E">confidential support</text>

  <text x="900" y="548" font-size="13" fill="#B08D57" text-anchor="end" letter-spacing="2">AKENIUS · ADVISORY</text>
</svg>
