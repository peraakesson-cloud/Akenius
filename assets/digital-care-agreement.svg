<svg viewBox="0 0 960 500" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="960" height="500" fill="#F7F5F1"/>

  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#B08D57">THE CARE AGREEMENT</text>
  <text x="60" y="92" font-size="27" fill="#23303D">One annual fee. Everything a site needs to stay alive.</text>

  <!-- Six items, 3x2 grid -->
  <!-- Item 1 -->
  <rect x="60" y="140" width="266" height="140" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <circle cx="92" cy="176" r="4.5" fill="#B08D57"/>
  <text x="110" y="182" font-size="16" fill="#23303D">Hosting</text>
  <text x="92" y="212" font-size="12" fill="#5B6672">Fast, reliable, monitored —</text>
  <text x="92" y="229" font-size="12" fill="#5B6672">the site stays up and stays</text>
  <text x="92" y="246" font-size="12" fill="#5B6672">quick.</text>

  <!-- Item 2 -->
  <rect x="347" y="140" width="266" height="140" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <circle cx="379" cy="176" r="4.5" fill="#B08D57"/>
  <text x="397" y="182" font-size="16" fill="#23303D">Security updates</text>
  <text x="379" y="212" font-size="12" fill="#5B6672">Software kept current, so</text>
  <text x="379" y="229" font-size="12" fill="#5B6672">the site doesn't become</text>
  <text x="379" y="246" font-size="12" fill="#5B6672">someone's way in.</text>

  <!-- Item 3 -->
  <rect x="634" y="140" width="266" height="140" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <circle cx="666" cy="176" r="4.5" fill="#B08D57"/>
  <text x="684" y="182" font-size="16" fill="#23303D">Backups</text>
  <text x="666" y="212" font-size="12" fill="#5B6672">Taken regularly, stored</text>
  <text x="666" y="229" font-size="12" fill="#5B6672">separately, tested — so bad</text>
  <text x="666" y="246" font-size="12" fill="#5B6672">days stay small.</text>

  <!-- Item 4 -->
  <rect x="60" y="300" width="266" height="140" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <circle cx="92" cy="336" r="4.5" fill="#B08D57"/>
  <text x="110" y="342" font-size="16" fill="#23303D">Monitoring</text>
  <text x="92" y="372" font-size="12" fill="#5B6672">We notice problems before</text>
  <text x="92" y="389" font-size="12" fill="#5B6672">you do — uptime, errors,</text>
  <text x="92" y="406" font-size="12" fill="#5B6672">expiring certificates.</text>

  <!-- Item 5 -->
  <rect x="347" y="300" width="266" height="140" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <circle cx="379" cy="336" r="4.5" fill="#B08D57"/>
  <text x="397" y="342" font-size="16" fill="#23303D">Content changes</text>
  <text x="379" y="372" font-size="12" fill="#5B6672">A defined amount of updates</text>
  <text x="379" y="389" font-size="12" fill="#5B6672">each year — texts, images,</text>
  <text x="379" y="406" font-size="12" fill="#5B6672">pages — included.</text>

  <!-- Item 6 -->
  <rect x="634" y="300" width="266" height="140" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <circle cx="666" cy="336" r="4.5" fill="#B08D57"/>
  <text x="684" y="342" font-size="16" fill="#23303D">One phone number</text>
  <text x="666" y="372" font-size="12" fill="#5B6672">When something breaks or a</text>
  <text x="666" y="389" font-size="12" fill="#5B6672">question comes up: one call,</text>
  <text x="666" y="406" font-size="12" fill="#5B6672">to the person who can fix it.</text>

  <text x="60" y="480" font-size="12.5" fill="#8A939E" font-style="italic">Scope and support levels are defined in the agreement — you know exactly what's included before you sign.</text>
  <text x="900" y="92" font-size="13" fill="#B08D57" text-anchor="end" letter-spacing="2">AKENIUS · DIGITAL</text>
</svg>
