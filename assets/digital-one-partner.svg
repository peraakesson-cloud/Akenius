<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="960" height="560" fill="#F7F5F1"/>

  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#B08D57">ONE ACCOUNTABLE PARTNER</text>
  <text x="60" y="92" font-size="27" fill="#23303D">Who do you call when it breaks?</text>

  <!-- LEFT: the usual setup -->
  <text x="270" y="150" font-size="15" fill="#5B6672" text-anchor="middle" font-style="italic">The usual setup</text>

  <!-- You (client) center -->
  <rect x="200" y="300" width="140" height="56" fill="#FFFFFF" stroke="#23303D" stroke-width="1.5"/>
  <text x="270" y="334" font-size="15" fill="#23303D" text-anchor="middle">You</text>

  <!-- Three suppliers around -->
  <rect x="90" y="180" width="150" height="50" fill="#FFFFFF" stroke="#8A939E" stroke-width="1"/>
  <text x="165" y="211" font-size="13" fill="#5B6672" text-anchor="middle">The designer</text>

  <rect x="300" y="180" width="150" height="50" fill="#FFFFFF" stroke="#8A939E" stroke-width="1"/>
  <text x="375" y="211" font-size="13" fill="#5B6672" text-anchor="middle">The host</text>

  <rect x="195" y="420" width="150" height="50" fill="#FFFFFF" stroke="#8A939E" stroke-width="1"/>
  <text x="270" y="451" font-size="13" fill="#5B6672" text-anchor="middle">The email provider</text>

  <!-- Chasing lines from You to each -->
  <line x1="235" y1="300" x2="180" y2="230" stroke="#8A939E" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="305" y1="300" x2="360" y2="230" stroke="#8A939E" stroke-width="1.2" stroke-dasharray="4 4"/>
  <line x1="270" y1="356" x2="270" y2="420" stroke="#8A939E" stroke-width="1.2" stroke-dasharray="4 4"/>
  <!-- Suppliers pointing at each other -->
  <line x1="240" y1="205" x2="300" y2="205" stroke="#8A939E" stroke-width="1.2" stroke-dasharray="4 4"/>

  <text x="270" y="510" font-size="12.5" fill="#8A939E" text-anchor="middle" font-style="italic">Three invoices. Three answers.</text>
  <text x="270" y="528" font-size="12.5" fill="#8A939E" text-anchor="middle" font-style="italic">Nobody accountable for the whole.</text>

  <!-- Divider -->
  <line x1="500" y1="150" x2="500" y2="490" stroke="#D8D3C8" stroke-width="1"/>

  <!-- RIGHT: the Akenius setup -->
  <text x="720" y="150" font-size="15" fill="#B08D57" text-anchor="middle" font-style="italic">With Akenius</text>

  <rect x="650" y="215" width="140" height="56" fill="#FFFFFF" stroke="#23303D" stroke-width="1.5"/>
  <text x="720" y="249" font-size="15" fill="#23303D" text-anchor="middle">You</text>

  <line x1="720" y1="271" x2="720" y2="330" stroke="#B08D57" stroke-width="2.5"/>

  <rect x="610" y="330" width="220" height="120" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="720" y="366" font-size="15" fill="#23303D" text-anchor="middle">Akenius</text>
  <text x="720" y="392" font-size="12" fill="#5B6672" text-anchor="middle">development · hosting</text>
  <text x="720" y="410" font-size="12" fill="#5B6672" text-anchor="middle">email · care · support</text>
  <text x="720" y="434" font-size="11.5" fill="#B08D57" text-anchor="middle" font-style="italic">built it, runs it, answers for it</text>

  <text x="720" y="510" font-size="12.5" fill="#B08D57" text-anchor="middle" font-style="italic">One agreement. One annual fee.</text>
  <text x="720" y="528" font-size="12.5" fill="#B08D57" text-anchor="middle" font-style="italic">One phone number.</text>

  <text x="900" y="92" font-size="13" fill="#B08D57" text-anchor="end" letter-spacing="2">AKENIUS · DIGITAL</text>
</svg>
