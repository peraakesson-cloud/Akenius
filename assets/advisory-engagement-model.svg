<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="960" height="440" fill="#F7F5F1"/>

  <text x="60" y="58" font-size="13" letter-spacing="3" fill="#B08D57">FOCUSED ENGAGEMENTS</text>
  <text x="60" y="92" font-size="27" fill="#23303D">Defined by a result, not a duration</text>

  <defs>
    <marker id="arrowInk" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A939E"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="60" y="150" width="186" height="160" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <text x="80" y="188" font-size="14" letter-spacing="2" fill="#B08D57">01</text>
  <text x="80" y="216" font-size="18" fill="#23303D">Diagnose</text>
  <text x="80" y="244" font-size="12" fill="#5B6672">A short, sharp fact base:</text>
  <text x="80" y="261" font-size="12" fill="#5B6672">numbers, customers,</text>
  <text x="80" y="278" font-size="12" fill="#5B6672">processes, people.</text>
  <text x="80" y="298" font-size="11.5" fill="#B08D57" font-style="italic">Weeks, not months.</text>

  <line x1="252" y1="230" x2="278" y2="230" stroke="#8A939E" stroke-width="1.5" marker-end="url(#arrowInk)"/>

  <!-- Step 2 -->
  <rect x="284" y="150" width="186" height="160" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <text x="304" y="188" font-size="14" letter-spacing="2" fill="#B08D57">02</text>
  <text x="304" y="216" font-size="18" fill="#23303D">Decide</text>
  <text x="304" y="244" font-size="12" fill="#5B6672">The real choices, made</text>
  <text x="304" y="261" font-size="12" fill="#5B6672">with your leadership team.</text>
  <text x="304" y="298" font-size="11.5" fill="#B08D57" font-style="italic">Including what to stop.</text>

  <line x1="476" y1="230" x2="502" y2="230" stroke="#8A939E" stroke-width="1.5" marker-end="url(#arrowInk)"/>

  <!-- Step 3 -->
  <rect x="508" y="150" width="186" height="160" fill="#FFFFFF" stroke="#D8D3C8" stroke-width="1"/>
  <text x="528" y="188" font-size="14" letter-spacing="2" fill="#B08D57">03</text>
  <text x="528" y="216" font-size="18" fill="#23303D">Implement</text>
  <text x="528" y="244" font-size="12" fill="#5B6672">Working alongside your</text>
  <text x="528" y="261" font-size="12" fill="#5B6672">organisation until changes</text>
  <text x="528" y="278" font-size="12" fill="#5B6672">operate without us.</text>
  <text x="528" y="298" font-size="11.5" fill="#B08D57" font-style="italic">Where value is won or lost.</text>

  <line x1="700" y1="230" x2="726" y2="230" stroke="#8A939E" stroke-width="1.5" marker-end="url(#arrowInk)"/>

  <!-- Step 4 -->
  <rect x="732" y="150" width="186" height="160" fill="#FFFFFF" stroke="#B08D57" stroke-width="1.5"/>
  <text x="752" y="188" font-size="14" letter-spacing="2" fill="#B08D57">04</text>
  <text x="752" y="216" font-size="18" fill="#23303D">Embed</text>
  <text x="752" y="244" font-size="12" fill="#5B6672">Ownership transferred.</text>
  <text x="752" y="261" font-size="12" fill="#5B6672">Results measured against</text>
  <text x="752" y="278" font-size="12" fill="#5B6672">the objectives set at start.</text>
  <text x="752" y="298" font-size="11.5" fill="#B08D57" font-style="italic">Then the engagement ends.</text>

  <!-- Footer -->
  <line x1="60" y1="360" x2="900" y2="360" stroke="#D8D3C8" stroke-width="1"/>
  <text x="60" y="388" font-size="13" fill="#8A939E" font-style="italic">If the result can't be measured, we won't propose the engagement.</text>
  <text x="900" y="388" font-size="13" fill="#B08D57" text-anchor="end" letter-spacing="2">AKENIUS · ADVISORY</text>
</svg>
